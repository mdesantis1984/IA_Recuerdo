apiVersion: apps/v1
kind: Deployment
metadata:
  name: ia-recuerdo
  labels:
    app: ia-recuerdo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ia-recuerdo
  template:
    metadata:
      labels:
        app: ia-recuerdo
    spec:
      containers:
      - name: ia-recuerdo
        image: ia-recuerdo:latest
        args:
        - -transport
        - http
        - -addr
        - :7438
        - -db-driver
        - postgres
        ports:
        - containerPort: 7438
          name: http
        envFrom:
        - secretRef:
            name: ia-recuerdo-secrets
        - configMapRef:
            name: ia-recuerdo-config
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 7438
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /healthz
            port: 7438
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ia-recuerdo
spec:
  selector:
    app: ia-recuerdo
  ports:
  - name: http
    port: 7438
    targetPort: 7438
  type: ClusterIP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ia-recuerdo-config
data:
  IA_PROJECT: "default"
  IA_TRANSPORT: "http"
  IA_ADDR: ":7438"
  IA_DB_DRIVER: "postgres"
