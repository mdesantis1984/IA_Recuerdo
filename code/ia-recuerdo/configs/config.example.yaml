# IA_Recuerdo — Configuración de ejemplo
# Copia este archivo a config.yaml y ajusta los valores
# Variables de entorno tienen precedencia sobre este archivo

# ──────────────────────────────────────────────────────────────
# Transport
# ──────────────────────────────────────────────────────────────
# Opciones: stdio | http | both
# stdio = acceso MCP vía stdin/stdout
# http  = acceso remoto sin instalar binario
# both  = ambos simultáneamente
transport: both
addr: ":7438"      # Puerto IA_Recuerdo

# ──────────────────────────────────────────────────────────────
# Base de datos
# ──────────────────────────────────────────────────────────────
db:
  driver: postgres
  dsn: "postgres://ia_recuerdo:PASS@localhost:5432/ia_recuerdo?sslmode=require"

  # producción (compilar con -tags postgres):
  # driver: postgres
  # dsn: "postgres://ia_recuerdo:PASS@localhost:5432/ia_recuerdo?sslmode=require"

# ──────────────────────────────────────────────────────────────
# Caché Valkey (opcional)
# ──────────────────────────────────────────────────────────────
# Si está vacío, el caché se desactiva sin error
valkey: ""          # "localhost:6379" para habilitar

# ──────────────────────────────────────────────────────────────
# Proyecto por defecto
# ──────────────────────────────────────────────────────────────
project: default

# ──────────────────────────────────────────────────────────────
# Variables de entorno equivalentes
# ──────────────────────────────────────────────────────────────
# IA_TRANSPORT=both
# IA_ADDR=:7438
# IA_DB_DRIVER=postgres
# IA_DB_DSN=postgres://...
# IA_VALKEY=localhost:6379
# IA_PROJECT=default
